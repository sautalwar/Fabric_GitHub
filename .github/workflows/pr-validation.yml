# ============================================================================
# Pull Request Validation
# ============================================================================
# Runs on every PR to validate code quality, migration integrity, and
# provide a summary of what will be deployed.
# ============================================================================

name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    name: "🔍 Validate Pull Request"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Analyze changed files
        id: analysis
        run: |
          # Categorize changes
          MIGRATIONS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'lakehouse-migrations/' | wc -l)
          NOTEBOOKS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'notebooks/' | wc -l)
          SCRIPTS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'scripts/' | wc -l)
          PIPELINES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'pipelines/' | wc -l)
          
          echo "migrations=$MIGRATIONS" >> $GITHUB_OUTPUT
          echo "notebooks=$NOTEBOOKS" >> $GITHUB_OUTPUT
          echo "scripts=$SCRIPTS" >> $GITHUB_OUTPUT
          echo "pipelines=$PIPELINES" >> $GITHUB_OUTPUT

      - name: ✅ Validate migrations (if changed)
        if: steps.analysis.outputs.migrations != '0'
        run: python scripts/validate_migrations.py

      - name: 💬 Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const migrations = '${{ steps.analysis.outputs.migrations }}';
            const notebooks = '${{ steps.analysis.outputs.notebooks }}';
            const scripts = '${{ steps.analysis.outputs.scripts }}';
            const pipelines = '${{ steps.analysis.outputs.pipelines }}';
            
            const body = `## 📋 PR Impact Analysis
            
            | Category | Files Changed |
            |----------|:------------:|
            | 🗄️ Lakehouse Migrations | ${migrations} |
            | 📓 Notebooks | ${notebooks} |
            | 🔧 Scripts | ${scripts} |
            | 🔄 Pipelines | ${pipelines} |
            
            ### Deployment path:
            \`\`\`
            PR Merge → main branch → Validate → Deploy UAT → ⏸️ Approval → Deploy Prod
            \`\`\`
            
            ${migrations > 0 ? '✅ Migration validation passed' : 'ℹ️ No migration changes detected'}
            
            > 🤖 Auto-generated by PR Validation workflow`;
            
            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => c.body.includes('PR Impact Analysis'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
