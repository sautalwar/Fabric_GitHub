# ============================================================================
# Schema Drift Detection
# ============================================================================
# Runs on a schedule to detect if someone made changes directly in Fabric
# that bypassed Git (e.g., manual table edits, ad-hoc column additions).
# Reports drift as a GitHub Issue for the team to investigate.
# ============================================================================

name: Schema Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Every weekday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  FABRIC_API_BASE: https://api.fabric.microsoft.com/v1

jobs:
  detect-drift:
    name: "🔍 Detect Schema Drift"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔐 Authenticate via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔍 Run drift detection
        id: drift
        run: |
          python scripts/drift_detector.py \
            --workspace-id ${{ secrets.PROD_WORKSPACE_ID }} \
            --output drift-report.json
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: 📋 Create issue if drift detected
        if: steps.drift.outputs.drift_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('drift-report.json', 'utf8'));
            
            const body = `## ⚠️ Schema Drift Detected
            
            **Detected at:** ${new Date().toISOString()}
            **Workspace:** Production
            
            ### Changes found outside of Git:
            ${report.drifts.map(d => `- **${d.table}**: ${d.change}`).join('\n')}
            
            ### Recommended action:
            1. Review the changes in the Fabric portal
            2. If intentional, create a migration file to capture the change
            3. If accidental, revert by syncing from Git
            
            > This issue was auto-generated by the drift detection workflow.`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Schema Drift Detected - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['schema-drift', 'needs-review']
            });
